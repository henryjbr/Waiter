name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "script.js"
      - "style.css"
      - "supabase-config.js"
      - "WaiterApp/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WaiterApp

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WaiterApp/package-lock.json

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.2

      - name: Instalar Android 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Instalar dependências
        run: npm ci

      - name: Validar JavaScript
        run: npm test

      - name: Gerar APK de teste
        run: npm run android:build

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Waiter-Android-debug
          path: WaiterApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
